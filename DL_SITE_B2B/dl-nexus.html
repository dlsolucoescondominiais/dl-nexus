<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DL Nexus | Portal de Acesso</title>
  <style>
    :root { --dl-blue-dark: #0b1f33; --dl-gold: #d9a441; }
    body { font-family: Arial, sans-serif; background: #071827; color: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
    .card { background: var(--dl-blue-dark); padding: 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    h1 { color: var(--dl-gold); margin-bottom: 10px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #1d5d8f; background: #071827; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: var(--dl-gold); color: var(--dl-blue-dark); border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
    .back { margin-top: 20px; display: inline-block; color: #888; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>DL Nexus V3</h1>
    <p>Área restrita para síndicos e administradoras.</p>
    <input type="text" placeholder="CNPJ ou Código do Condomínio" disabled />
    <input type="password" placeholder="Senha" disabled />
    <button disabled>Login em breve</button>
    <a href="index.html" class="back">&larr; Retornar ao site corporativo</a>
  </div>
</body>
</html>
