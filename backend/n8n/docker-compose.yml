version: '3.8'

volumes:
  caddy_data: {}
  caddy_config: {}
  n8n_data: {}
  picoclaw_data: {}

services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.dlsolucoescondominiais.com.br
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.dlsolucoescondominiais.com.br/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      # Credenciais do Arquivo Config N8N.md
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_API_KEY=${SUPABASE_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - caddy

  picoclaw:
    image: ghcr.io/sipeed/picoclaw:latest # Imagem de container padrão do projeto
    restart: always
    ports:
      - "18800:18800" # Porta da interface web exposta na VPS
      - "8080:8080"   # Porta nativa da API exposta na VPS
    volumes:
      - picoclaw_data:/app/data

  antigravity:
    build:
      context: ../../
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      # Outras variaveis que o Antigravity precisar (como GEMINI_API_KEY) devem ser injetadas aqui ou no arquivo .env da HostGator
      - N8N_INTERNAL_URL=http://n8n:5678
    depends_on:
      - n8n
